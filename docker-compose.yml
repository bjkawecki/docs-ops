services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: docsops
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d docsops']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      # Nicht die MinIO-Defaults nutzen (Warnung vermeiden). Für Prod: .env mit echten Werten.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-docsops}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-docsopsdev}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8080/ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    command: sh -c "node dist/src/entrypoints/worker.js"
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.node-dev
    image: docsops-node-dev
    restart: unless-stopped
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app
    ports:
      - '5173:5173'
    depends_on:
      # Sonst startet Vite bevor `app` im Docker-DNS existiert → getaddrinfo ENOTFOUND app;
      # danach ggf. ECONNREFUSED bis der Server lauscht.
      app:
        condition: service_healthy
    environment:
      # Vite-Proxy im Container: /api → Backend-Service (nicht 127.0.0.1)
      VITE_DEV_PROXY_API: http://app:8080
    volumes:
      - .:/app
    # --ignore-scripts avoids backend prepare (prisma generate) in this container;
    # we run prisma generate once so frontend has types. No dependency on app.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:5173/ || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30
      # Frontend braucht beim ersten Start oft länger (pnpm install + prisma generate + vite).
      # Längeres Startfenster verhindert False-Negatives beim Healthcheck.
      start_period: 120s
    command: sh -c "pnpm install --ignore-scripts && pnpm --filter backend exec prisma generate && pnpm --filter frontend run dev"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '5000:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
