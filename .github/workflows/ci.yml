name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  # install-test: vorübergehend deaktiviert
  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Production install (non-interactive)
        env:
          DOCSOPS_NON_INTERACTIVE: '1'
          DOCSOPS_ASSUME_YES: '1'
          DOCSOPS_INSTALL_DIR: ${{ github.workspace }}
          DOCSOPS_EXTRA_COMPOSE_FILES: docker-compose.ci.yml
          DOCSOPS_HEALTH_URL: http://127.0.0.1:8080/health
          ADMIN_EMAIL: install-test@example.com
          ADMIN_PASSWORD: install-test-password-12
        run: |
          sudo bash scripts/install-prod.sh

      - name: Health check
        run: curl -sf http://127.0.0.1:8080/health
