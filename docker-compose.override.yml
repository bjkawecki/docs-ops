# Prod-nah: App per Volume-Mount + Watch. Nutzung: docker compose up
# Caddy leitet auf app:8080; Backend-Code wird live neu geladen.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.node-dev
    image: docsops-node-dev
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pnpm install && pnpm --filter backend exec prisma migrate deploy && (pnpm --filter backend run create-admin || true) && pnpm --filter backend run dev"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CI: 'true'
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      ADMIN_VORNAME: ${ADMIN_VORNAME:-}
      ADMIN_NACHNAME: ${ADMIN_NACHNAME:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8080/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.node-dev
    image: docsops-node-dev
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pnpm --filter backend run worker:dev"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      CI: 'true'
      NODE_ENV: development
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
