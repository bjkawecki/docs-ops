# Production stack: built images, Caddy on port 80, no dev override.
# Usage: COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml docker compose \
#   --env-file /etc/docsops/docsops.env up -d --build

services:
  app:
    environment:
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      ADMIN_VORNAME: ${ADMIN_VORNAME:-}
      ADMIN_NACHNAME: ${ADMIN_NACHNAME:-}

  docsops-job-worker:
    environment:
      NODE_ENV: production

  frontend:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: docsops-frontend-prod
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:80/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  caddy:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
