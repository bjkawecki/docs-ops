# Production stack: GHCR images, Caddy on port 80. Requires DOCSOPS_VERSION and DOCSOPS_IMAGE_PREFIX in env.
# Usage: docker compose --env-file /etc/docsops/docsops.env \
#   -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose --env-file /etc/docsops/docsops.env \
#   -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  docsops-updater:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-updater
    image: ${DOCSOPS_IMAGE_PREFIX}/docsops-updater:${DOCSOPS_VERSION}
    restart: unless-stopped
    user: root
    environment:
      DOCSOPS_UPDATER_TOKEN: ${DOCSOPS_UPDATER_TOKEN:-}
      DOCSOPS_INSTALL_DIR: /opt/docsops
      DOCSOPS_ENV_FILE: /etc/docsops/docsops.env
      DOCSOPS_HEALTH_URL: ${DOCSOPS_HEALTH_URL:-http://host.docker.internal/health}
      PORT: 8090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCSOPS_INSTALL_DIR:-/opt/docsops}:/opt/docsops
      - /etc/docsops/docsops.env:/etc/docsops/docsops.env:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  app:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-app
    image: ${DOCSOPS_IMAGE_PREFIX}/docsops-app:${DOCSOPS_VERSION}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
      SESSION_SECRET: ${SESSION_SECRET:-}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      ADMIN_VORNAME: ${ADMIN_VORNAME:-}
      ADMIN_NACHNAME: ${ADMIN_NACHNAME:-}
      DOCSOPS_UPDATE_GITHUB_REPO: ${DOCSOPS_UPDATE_GITHUB_REPO:-}
      DOCSOPS_UPDATER_URL: ${DOCSOPS_UPDATER_URL:-http://docsops-updater:8090}
      DOCSOPS_UPDATER_TOKEN: ${DOCSOPS_UPDATER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8080/ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  docsops-job-worker:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-job-worker
    image: ${DOCSOPS_IMAGE_PREFIX}/docsops-worker:${DOCSOPS_VERSION}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://app:app@postgres:5432/docsops
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-docsops}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-docsopsdev}
      SESSION_SECRET: ${SESSION_SECRET:-}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-}
      PANDOC_ARGS: ${PANDOC_ARGS:---pdf-engine=typst}
      DOCSOPS_UPDATER_URL: ${DOCSOPS_UPDATER_URL:-http://docsops-updater:8090}
      DOCSOPS_UPDATER_TOKEN: ${DOCSOPS_UPDATER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-frontend
    image: ${DOCSOPS_IMAGE_PREFIX}/docsops-frontend:${DOCSOPS_VERSION}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:80/ || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  caddy:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
